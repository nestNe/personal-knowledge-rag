server:
  port: 8080
spring:
  application:
    name: agent-guard-starter
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  config:
    import: optional:application-local.yaml
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# JWT配置
jwt:
  secret: your-256-bit-secret-key-here-must-be-at-least-32-characters-long
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  #  type-aliases-package: com.example.rbac.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted   # 如需逻辑删除
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.seehold.mapper: debug
#    org.springframework.ai.chat.memory: DEBUG
#    org.springframework.jdbc: DEBUG

# 系统配置
seehold:
  default:
    role-name: user